<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Delta Coding — Tactical Dev Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v='20260701r1') }}">
  </head>
  <body>
    <header class="hero">
      <a href="/truth" class="delta-logo" aria-hidden="true" title="" style="text-decoration:none">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="64" height="64" rx="8" fill="#1a1f16"/>
          <path d="M32 10L54 50H10L32 10Z" fill="none" stroke="#8B9D6A" stroke-width="3"/>
          <path d="M32 20L46 46H18L32 20Z" fill="#8B9D6A" opacity="0.3"/>
          <line x1="32" y1="24" x2="32" y2="46" stroke="#C8D5A3" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="25" y1="32" x2="39" y2="32" stroke="#C8D5A3" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </a>
      <div class="title">
        <h1>DELTA CODING</h1>
        <p class="tag">TACTICAL DEV PLATFORM — Python &bull; Java &bull; HTML &bull; CSS &bull; JS</p>
      </div>
      <nav class="top-nav">
        <a href="/" class="active">Ops Center</a>
        <a href="/cyber">Cyber Intel</a>
        <a href="/ai">AI Recon</a>
        <a href="/map">Tac Map</a>
        <a href="/bible">Scripture</a>
        <a href="/drone">Drone</a>
      </nav>
    </header>

    <main class="container">
      <section class="editor">
        <div class="controls">
          <label for="language">Language</label>
          <select id="language">
            <option value="python">Python 3</option>
            <option value="java">Java</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="web">Web (HTML+CSS+JS)</option>
          </select>
          {% if admin_token_set %}
          <input id="opsToken" type="password" class="share-link-input" placeholder="Admin token for Run + Agent" autocomplete="off" aria-label="Admin token for Run and Agent" style="width:auto;flex:1 1 240px;min-width:220px;margin-bottom:0" />
          {% endif %}
          <button id="run"{% if execution_locked %} disabled title="Execution locked on this deployment"{% endif %}>Run</button>
          <button id="reset">Reset</button>
        </div>
        <!-- Single editor (Python / Java / HTML-only / CSS-only) -->
        <div id="editor" class="editor-pane"></div>
        <!-- Multi-tab editors (Web mode) -->
        <div id="webEditors" class="web-editors" style="display:none;">
          <div class="editor-tabs">
            <button class="etab active" data-pane="html">HTML</button>
            <button class="etab" data-pane="css">CSS</button>
            <button class="etab" data-pane="js">JS</button>
          </div>
          <div id="editorHtml" class="editor-pane sub-editor active"></div>
          <div id="editorCss" class="editor-pane sub-editor" style="display:none;"></div>
          <div id="editorJs" class="editor-pane sub-editor" style="display:none;"></div>
        </div>
      </section>

      <aside class="output">
        <div class="agent-controls">
          <h2>Agent</h2>
          <textarea id="instruction" placeholder="Tell the agent what to build (e.g., 'create a Flask web API')"></textarea>
          <div class="agent-row">
              <input id="project_name" placeholder="project name (optional)" />
              <label><input type="checkbox" id="agent_execute" /> Execute</label>
              <label><input type="checkbox" id="agent_confirm" /> Confirm</label>
              <label title="Use LLM to expand instruction"><input type="checkbox" id="use_llm" /> LLM</label>
              <button id="askAgent"{% if execution_locked %} disabled title="Execution locked on this deployment"{% endif %}>Ask Agent</button>
            </div>
            <div class="agent-row">
              <button id="downloadProject" disabled>Download Last</button>
              <button id="refreshProjects" onclick="fetchProjects()">Refresh</button>
            </div>
            <div class="project-toolbar" id="projectToolbar" style="display:none;margin-top:8px;">
              <label class="select-all-label"><input type="checkbox" id="selectAll" /> Select All</label>
              <button id="downloadSelected" class="toolbar-btn" disabled>Download Selected</button>
              <button id="deleteSelected" class="toolbar-btn danger" disabled>Delete Selected</button>
            </div>
            <div id="projectList" style="margin-top:8px"></div>
        </div>

        <h2>Output</h2>
        <pre id="output">Awaiting code...</pre>
        <iframe id="htmlPreview" class="html-preview" style="display:none" sandbox="allow-scripts"></iframe>

        <h3>Agent Result</h3>
        <pre id="agent_output">No agent activity yet.</pre>
      </aside>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.14/ace.js"></script>
    <script>
      // ─── Templates ───
      const pythonTemplate = `print("Delta Coding — Operational")\nfor i in range(3):\n    print(f"Mission {i+1}: Complete")`;
      const javaTemplate = `public class Main {\n    public static void main(String[] args) {\n        System.out.println("Delta Coding — Operational");\n        for (int i=1;i<=3;i++) System.out.println("Mission " + i + ": Complete");\n    }\n}`;
      const htmlTemplate = `<!DOCTYPE html>\n<html>\n<head>\n  <title>Delta Page</title>\n</head>\n<body>\n  <h1>Delta Coding</h1>\n  <p>Tactical development platform.</p>\n</body>\n</html>`;
      const cssTemplate = `body {\n  background: #1a1f16;\n  color: #C8D5A3;\n  font-family: 'Courier New', monospace;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  height: 100vh;\n  margin: 0;\n}\n\nh1 {\n  font-size: 3rem;\n  text-shadow: 0 0 20px rgba(139,157,106,.5);\n  letter-spacing: 4px;\n  text-transform: uppercase;\n}`;
      const webHtmlTemplate = `<!DOCTYPE html>\n<html>\n<head>\n  <title>Delta Page</title>\n</head>\n<body>\n  <div class="command-center">\n    <h1>DELTA CODING</h1>\n    <p>Tactical development platform</p>\n    <button id="btn">ENGAGE</button>\n    <p id="counter"></p>\n  </div>\n</body>\n</html>`;
      const webCssTemplate = `.command-center {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  height: 100vh;\n  margin: 0;\n  background: linear-gradient(135deg, #1a1f16, #2d3328);\n  color: #C8D5A3;\n  font-family: 'Courier New', monospace;\n}\n\nh1 {\n  font-size: 3rem;\n  letter-spacing: 6px;\n  text-shadow: 0 0 30px rgba(139,157,106,.4);\n}\n\nbutton {\n  background: linear-gradient(135deg, #6B7F4E, #8B9D6A);\n  color: #1a1f16;\n  border: 2px solid #4a5a36;\n  padding: 14px 28px;\n  font-size: 14px;\n  border-radius: 4px;\n  cursor: pointer;\n  font-weight: bold;\n  letter-spacing: 3px;\n  text-transform: uppercase;\n  font-family: monospace;\n}\n\nbutton:hover {\n  background: linear-gradient(135deg, #8B9D6A, #A4B87A);\n  box-shadow: 0 0 20px rgba(139,157,106,.3);\n}`;
      const webJsTemplate = `let count = 0;\ndocument.getElementById('btn').addEventListener('click', () => {\n  count++;\n  document.getElementById('counter').textContent = 'Operations executed: ' + count;\n});`;

      const langEl = document.getElementById('language');
      const outEl = document.getElementById('output');
      const previewEl = document.getElementById('htmlPreview');

      // ─── Single-mode Ace editor ───
      const editor = ace.edit('editor');
      editor.setTheme('ace/theme/monokai');
      editor.session.setMode('ace/mode/python');
      editor.setOptions({fontSize: '13px', showPrintMargin: false});

      // ─── Web-mode Ace editors ───
      const editorHtml = ace.edit('editorHtml');
      const editorCss = ace.edit('editorCss');
      const editorJs = ace.edit('editorJs');
      [editorHtml, editorCss, editorJs].forEach(e => {
        e.setTheme('ace/theme/monokai');
        e.setOptions({fontSize: '13px', showPrintMargin: false});
      });
      editorHtml.session.setMode('ace/mode/html');
      editorCss.session.setMode('ace/mode/css');
      editorJs.session.setMode('ace/mode/javascript');

      // ─── Web editor tabs ───
      document.querySelectorAll('.editor-tabs .etab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.etab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.sub-editor').forEach(t => { t.style.display = 'none'; t.classList.remove('active'); });
          btn.classList.add('active');
          const pane = document.getElementById('editor' + btn.dataset.pane.charAt(0).toUpperCase() + btn.dataset.pane.slice(1));
          pane.style.display = 'block';
          pane.classList.add('active');
          // Refresh ace so it redraws correctly
          const aceMap = {html: editorHtml, css: editorCss, js: editorJs};
          aceMap[btn.dataset.pane].resize();
        });
      });

      // ─── Auto-preview on type in web mode ───
      let liveTimer = null;
      function autoPreview() {
        clearTimeout(liveTimer);
        liveTimer = setTimeout(() => {
          if (langEl.value === 'web') {
            const h = editorHtml.getValue(), c = editorCss.getValue(), j = editorJs.getValue();
            let combined = h;
            if (c) combined = combined.includes('</head>') ? combined.replace('</head>', `<style>${c}</style>\n</head>`) : `<style>${c}</style>\n` + combined;
            if (j) combined = combined.includes('</body>') ? combined.replace('</body>', `<script>${j}<\/script>\n</body>`) : combined + `\n<script>${j}<\/script>`;
            previewEl.srcdoc = combined;
          }
        }, 400);
      }
      editorHtml.session.on('change', autoPreview);
      editorCss.session.on('change', autoPreview);
      editorJs.session.on('change', autoPreview);

      const modes = { python: 'ace/mode/python', java: 'ace/mode/java', html: 'ace/mode/html', css: 'ace/mode/css' };
      const templates = { python: pythonTemplate, java: javaTemplate, html: htmlTemplate, css: cssTemplate };

      function setTemplate() {
        const lang = langEl.value;
        const singlePane = document.getElementById('editor');
        const webPane = document.getElementById('webEditors');

        if (lang === 'web') {
          singlePane.style.display = 'none';
          webPane.style.display = 'flex';
          editorHtml.setValue(webHtmlTemplate, -1);
          editorCss.setValue(webCssTemplate, -1);
          editorJs.setValue(webJsTemplate, -1);
          previewEl.style.display = 'block'; outEl.style.display = 'none';
          // Trigger initial tab resize
          editorHtml.resize(); editorCss.resize(); editorJs.resize();
          autoPreview();
        } else {
          singlePane.style.display = 'block';
          webPane.style.display = 'none';
          editor.session.setMode(modes[lang] || 'ace/mode/text');
          editor.setValue(templates[lang] || '', -1);
          if (lang === 'html' || lang === 'css') { previewEl.style.display = 'block'; outEl.style.display = 'none'; }
          else { previewEl.style.display = 'none'; outEl.style.display = 'block'; }
        }
      }

      langEl.addEventListener('change', setTemplate);

      document.getElementById('run').addEventListener('click', async () => {
        const lang = langEl.value;
        outEl.textContent = 'Running...';

        if (lang === 'web') {
          // Combine all three panes into one HTML preview
          const h = editorHtml.getValue(), c = editorCss.getValue(), j = editorJs.getValue();
          try {
            const res = await fetch('/run', {
              method: 'POST', headers: buildJsonHeaders(),
              body: JSON.stringify({language: 'html', code: h, css: c, js: j})
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Run failed');
            if (data.html) { previewEl.style.display = 'block'; outEl.style.display = 'none'; previewEl.srcdoc = data.html; }
          } catch (err) { outEl.textContent = 'Error: ' + err.message; }
          return;
        }

        try {
          const codeVal = editor.getValue();
          const body = {language: lang, code: codeVal};
          // For CSS-only mode, also send current HTML if user has one
          const res = await fetch('/run', {
            method: 'POST', headers: buildJsonHeaders(),
            body: JSON.stringify(body)
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Run failed');
          if (data.html) {
            previewEl.style.display = 'block'; outEl.style.display = 'none';
            previewEl.srcdoc = data.html;
          } else {
            previewEl.style.display = 'none'; outEl.style.display = 'block';
            if (data.compile_error) outEl.textContent = data.compile_error;
            else if (data.error) outEl.textContent = data.error;
            else outEl.textContent = (data.stderr || '') + (data.stdout || '');
          }
        } catch (err) { outEl.textContent = 'Network or server error: ' + err.message; }
      });

      document.getElementById('reset').addEventListener('click', setTemplate);
      setTemplate();

      // ─── Agent UI ───
      const instrEl = document.getElementById('instruction');
      const agentOutEl = document.getElementById('agent_output');
      let lastProject = null;
      document.getElementById('askAgent').addEventListener('click', async () => {
        agentOutEl.textContent = 'Working...';
        try {
          const res = await fetch('/agent', {
            method: 'POST',
            headers: buildJsonHeaders(),
            body: JSON.stringify({
              instruction: instrEl.value,
              project_name: document.getElementById('project_name').value,
              execute: document.getElementById('agent_execute').checked,
              confirm: document.getElementById('agent_confirm').checked,
              use_llm: document.getElementById('use_llm') ? document.getElementById('use_llm').checked : false,
            })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Agent request failed');
          agentOutEl.textContent = JSON.stringify(data, null, 2);
          if (data && data.project_name) {
            lastProject = data.project_name;
            document.getElementById('downloadProject').disabled = false;
            await fetchProjects();
          }
        } catch (err) {
          agentOutEl.textContent = 'Network or server error: ' + err.message;
        }
      });

      // ─── Projects list with select/delete ───
      function getSelectedProjects() {
        return [...document.querySelectorAll('.project-check:checked')].map(cb => cb.dataset.name);
      }

      function updateToolbar() {
        const selected = getSelectedProjects();
        const toolbar = document.getElementById('projectToolbar');
        document.getElementById('downloadSelected').disabled = selected.length === 0;
        document.getElementById('deleteSelected').disabled = selected.length === 0;
        document.getElementById('downloadSelected').textContent = selected.length > 0 ? `Download (${selected.length})` : 'Download Selected';
        document.getElementById('deleteSelected').textContent = selected.length > 0 ? `Delete (${selected.length})` : 'Delete Selected';
      }

      async function fetchProjects() {
        try {
          const res = await fetch('/projects');
          const data = await res.json();
          const list = document.getElementById('projectList');
          const toolbar = document.getElementById('projectToolbar');
          list.innerHTML = '';
          const projects = data.projects || [];
          toolbar.style.display = projects.length > 0 ? 'flex' : 'none';
          document.getElementById('selectAll').checked = false;

          projects.forEach(p => {
            const el = document.createElement('div');
            el.className = 'project-item';
            el.innerHTML = `
              <label class="project-check-label">
                <input type="checkbox" class="project-check" data-name="${p}" />
                <span class="project-name">${p}</span>
              </label>
              <div class="project-actions">
                <button class="proj-dl-btn" title="Download">&#8615;</button>
                <button class="proj-del-btn danger" title="Delete">&times;</button>
              </div>`;
            el.querySelector('.project-check').addEventListener('change', updateToolbar);
            el.querySelector('.proj-dl-btn').addEventListener('click', () => window.location = `/download/${encodeURIComponent(p)}`);
            el.querySelector('.proj-del-btn').addEventListener('click', async () => {
              if (!confirm(`Delete project "${p}"?`)) return;
              await fetch('/api/projects/delete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({projects: [p]}) });
              fetchProjects();
            });
            list.appendChild(el);
          });
          updateToolbar();
        } catch (e) { console.warn(e); }
      }

      // Select All
      document.getElementById('selectAll').addEventListener('change', e => {
        document.querySelectorAll('.project-check').forEach(cb => { cb.checked = e.target.checked; });
        updateToolbar();
      });

      // Delete Selected
      document.getElementById('deleteSelected').addEventListener('click', async () => {
        const selected = getSelectedProjects();
        if (selected.length === 0) return;
        if (!confirm(`Delete ${selected.length} project(s)?`)) return;
        await fetch('/api/projects/delete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({projects: selected}) });
        fetchProjects();
      });

      // Download Selected
      document.getElementById('downloadSelected').addEventListener('click', async () => {
        const selected = getSelectedProjects();
        if (selected.length === 0) return;
        if (selected.length === 1) { window.location = `/download/${encodeURIComponent(selected[0])}`; return; }
        const res = await fetch('/api/projects/download', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({projects: selected}) });
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'delta_projects.zip'; a.click();
        URL.revokeObjectURL(url);
      });

      document.getElementById('downloadProject').addEventListener('click', () => {
        if (lastProject) window.location = `/download/${encodeURIComponent(lastProject)}`;
      });

      setTemplate();
      fetchProjects();
    </script>

    <!-- DELTA RADIO FOOTER -->
    <div class="radio-footer" id="radio-footer">
      <div class="rf-left">
        <button class="rf-btn" id="rf-play" title="Play/Pause">&#x25B6;</button>
        <button class="rf-btn" id="rf-stop" title="Stop">&#x25A0;</button>
        <select class="rf-select" id="rf-station">
          <option value="">— SELECT FREQ —</option>
          <option value="https://radio.weatherusa.net/NWR/KEC80.mp3">NOAA Weather</option>
          <option value="https://broadcastify.cdnstream1.com/14747">Scanner Radio</option>
          <option value="https://stream.live.vc.bbcmedia.co.uk/bbc_world_service">BBC World Svc</option>
          <option value="https://npr-ice.streamguys1.com/live.mp3">NPR News</option>
          <option value="https://stream.wqxr.org/js-stream.aac">Classical WQXR</option>
          <option value="https://play.streamafrica.net/lofiradio">Lofi Beats</option>
          <option value="https://jazz-wr04.ice.infomaniak.ch/jazz-wr04-128.mp3">Jazz FM</option>
          <option value="https://stream.infowars.com/live">Infowars Live</option>
          <option value="https://playerservices.streamtheworld.com/api/livestream-redirect/KABORAM.mp3">Bible Audio</option>
        </select>
      </div>
      <div class="rf-center">
        <div class="rf-viz" id="rf-viz"></div>
        <span class="rf-now" id="rf-now">NO SIGNAL</span>
      </div>
      <div class="rf-right">
        <input type="range" class="rf-vol" id="rf-vol" min="0" max="100" value="60">
        <a href="/radio" class="rf-settings" title="SIGINT Radio Lab">&#x2699;</a>
        <span class="rf-copy"><span class="copy-sym">&copy;</span> DELTA CODING</span>
      </div>
      <audio id="rf-audio" preload="none"></audio>
    </div>
    <script>
    (function(){
      const au=document.getElementById('rf-audio'),sel=document.getElementById('rf-station'),now=document.getElementById('rf-now'),viz=document.getElementById('rf-viz'),vol=document.getElementById('rf-vol');
      let vizI=null,bars=[],userPaused=false;
      for(let i=0;i<12;i++){const b=document.createElement('div');b.className='rf-bar';viz.appendChild(b);bars.push(b);}
      function saveState(){localStorage.setItem('deltaRadio',JSON.stringify({src:au.src||'',vol:vol.value,playing:!au.paused&&!userPaused,station:sel.value,name:now.textContent}));}
      function startV(){clearInterval(vizI);vizI=setInterval(()=>{bars.forEach(b=>{b.style.height=(2+Math.random()*14)+'px';});},120);}
      function stopV(){clearInterval(vizI);bars.forEach(b=>{b.style.height='2px';});}
      au.addEventListener('pause',()=>{if(!userPaused&&au.src){setTimeout(()=>{if(!userPaused&&au.src)au.play().catch(()=>{});},100);}});
      sel.addEventListener('change',()=>{if(!sel.value){userPaused=true;au.pause();au.src='';now.textContent='NO SIGNAL';stopV();saveState();return;}userPaused=false;au.src=sel.value;au.play().catch(()=>{});now.textContent=sel.options[sel.selectedIndex].text;startV();saveState();});
      document.getElementById('rf-play').addEventListener('click',()=>{if(!au.src)return;if(au.paused){userPaused=false;au.play().catch(()=>{});startV();}else{userPaused=true;au.pause();stopV();}saveState();});
      document.getElementById('rf-stop').addEventListener('click',()=>{userPaused=true;au.pause();au.src='';sel.value='';now.textContent='NO SIGNAL';stopV();saveState();});
      vol.addEventListener('input',()=>{au.volume=vol.value/100;saveState();});
      document.addEventListener('visibilitychange',()=>{if(!document.hidden&&au.src&&!userPaused){au.play().catch(()=>{});startV();}});
      // Restore state on load
      try{const s=JSON.parse(localStorage.getItem('deltaRadio'));if(s&&s.src&&s.playing){sel.value=s.station||'';vol.value=s.vol||60;au.volume=(s.vol||60)/100;au.src=s.src;userPaused=false;au.play().then(()=>{now.textContent=s.name||sel.options[sel.selectedIndex]?.text||'RECEIVING';startV();}).catch(()=>{now.textContent=s.name||'SIGNAL READY (tap play)';sel.value=s.station||'';});}else if(s){sel.value=s.station||'';vol.value=s.vol||60;au.volume=(s.vol||60)/100;if(s.station){au.src=s.src;now.textContent=s.name||'PAUSED';userPaused=true;}}}catch(e){}
    })();
    </script>
  </body>
</html>
