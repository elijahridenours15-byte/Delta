<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Delta Coding — Scripture Intel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
      .container{display:block;height:auto}
      .bible-wrap{max-width:960px;margin:0 auto;padding:20px}
      .bible-header{text-align:center;margin-bottom:24px}
      .bible-header h2{color:var(--accent-bright);font-family:'JetBrains Mono',monospace;font-size:1.5rem;letter-spacing:2px;margin:0 0 4px}
      .bible-header p{color:var(--muted);font-size:.85rem;margin:0}

      .bible-scripture-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;padding:0 0 14px;border-bottom:1px solid var(--border)}
      .bible-scripture-controls select,.bible-scripture-controls button{
        font-family:'JetBrains Mono',monospace;font-size:.82rem;
        background:var(--panel2);color:var(--text);border:1px solid var(--border2);
        padding:8px 12px;border-radius:6px;cursor:pointer;
      }
      .bible-scripture-controls select:focus,.bible-scripture-controls button:focus{outline:none;border-color:var(--accent)}
      .bible-scripture-controls select{min-width:140px}
      .bible-scripture-controls button{background:var(--accent2);color:#fff;font-weight:700;letter-spacing:1px;min-width:80px}
      .bible-scripture-controls button:hover{background:var(--accent)}
      .bible-scripture-controls button:disabled{opacity:.5;cursor:not-allowed}
      .bible-scripture-box .bible-nav{margin-bottom:0}

      .bible-nav{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
      .bible-nav button{font-family:'JetBrains Mono',monospace;font-size:.78rem;background:var(--panel2);color:var(--text2);border:1px solid var(--border);padding:6px 14px;border-radius:6px;cursor:pointer}
      .bible-nav button:hover{border-color:var(--accent);color:var(--accent-bright)}
      .bible-nav button:disabled{opacity:.3;cursor:not-allowed}

      .bible-display-tools{display:flex;align-items:stretch;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;background:var(--panel);border:1px solid var(--border);border-radius:8px}
      .bible-display-tool-group{display:grid;gap:6px;min-width:220px;flex:1 1 280px}
      .bible-display-tools-label{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
      .bible-color-wheel-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
      .bible-color-wheel{width:46px;height:46px;padding:0;border:none;background:transparent;cursor:pointer}
      .bible-color-wheel::-webkit-color-swatch-wrapper{padding:0}
      .bible-color-wheel::-webkit-color-swatch{border:2px solid var(--border2);border-radius:50%}
      .bible-color-wheel::-moz-color-swatch{border:2px solid var(--border2);border-radius:50%}
      .bible-color-reset{font-family:'JetBrains Mono',monospace;font-size:.74rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:var(--panel2);color:var(--text);border:1px solid var(--border2);padding:8px 12px;border-radius:999px;cursor:pointer;transition:all .15s}
      .bible-color-reset:hover{border-color:var(--accent);color:var(--accent-bright)}
      .bible-color-value{font-family:'JetBrains Mono',monospace;font-size:.74rem;letter-spacing:.8px;color:var(--accent-bright);text-transform:uppercase}
      .bible-color-hint{font-size:.78rem;color:var(--muted);line-height:1.5}

      .bible-scripture-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px 20px;display:grid;gap:16px}
      .bible-text{
        min-height:350px;
        font-family:'Inter',sans-serif;line-height:1.85;font-size:.95rem;color:var(--bible-scripture-color,var(--text));
      }
      .bible-text .verse{margin-bottom:8px}
      .bible-text .verse.is-highlightable{margin:0 -6px 8px;padding:4px 6px;border-radius:6px;cursor:pointer;transition:background-color .15s ease, box-shadow .15s ease}
      .bible-text .verse.is-highlightable:hover{box-shadow:inset 0 0 0 1px rgba(139,157,106,.2)}
      .bible-text .verse.is-highlighted{background:var(--bible-verse-highlight-bg, rgba(244,236,115,.32));box-shadow:inset 0 0 0 1px var(--bible-verse-highlight-edge, rgba(244,236,115,.58))}
      .bible-text .verse-num{color:var(--accent);font-weight:700;font-size:.75rem;margin-right:6px;font-family:'JetBrains Mono',monospace;vertical-align:super}
      .bible-text .chapter-title{color:var(--accent-bright);font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;margin-bottom:16px;letter-spacing:1px;border-bottom:1px solid var(--border);padding-bottom:8px}
      .bible-text .loading{color:var(--muted);font-style:italic;text-align:center;padding:40px}
      .bible-text .error{color:var(--danger);text-align:center;padding:40px}

      .bible-bookmarks{margin-bottom:16px;text-align:center}
      .bible-bookmarks button{font-family:'JetBrains Mono',monospace;font-size:.72rem;background:var(--panel2);color:var(--gold);border:1px solid var(--border);padding:4px 10px;border-radius:4px;cursor:pointer;margin:2px}
      .bible-bookmarks button:hover{border-color:var(--gold)}
      .bible-bookmarks .bm-title{color:var(--muted);font-size:.72rem;font-family:'JetBrains Mono',monospace;margin-right:6px}

      .bible-journal-shell{margin-top:40px;padding:24px 28px;background:var(--panel2);border:1px solid var(--border);border-radius:8px}
      .bible-journal-head{margin-bottom:16px}
      .bible-journal-head h3{margin:0 0 6px;color:var(--accent-bright);font-family:'JetBrains Mono',monospace;font-size:1.08rem;letter-spacing:1.4px;text-transform:uppercase}
      .bible-journal-head p{margin:0;color:var(--muted);font-size:.88rem;line-height:1.7}
      .bible-journal-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
      .journal-card{padding:18px;border:1px solid var(--border);border-radius:8px;background:var(--panel);display:grid;gap:12px;align-content:start}
      .journal-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
      .journal-kicker{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;border:1px solid rgba(139,157,106,.22);background:rgba(18,24,16,.85);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:1.2px;text-transform:uppercase}
      .journal-card h4{margin:8px 0 4px;color:var(--accent-bright);font-family:'JetBrains Mono',monospace;font-size:.92rem;letter-spacing:1px;text-transform:uppercase}
      .journal-card p{margin:0;color:var(--muted);font-size:.82rem;line-height:1.7}
      .journal-chip{padding:5px 8px;border-radius:999px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:1px;text-transform:uppercase}
      .journal-chip.is-live{border-color:rgba(139,157,106,.28);color:var(--accent-bright)}
      .journal-focus{padding:9px 10px;border-radius:6px;background:rgba(18,24,16,.82);border:1px solid rgba(139,157,106,.16);color:var(--sand);font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.4px;line-height:1.6}
      .journal-helper{padding:10px 12px;border-radius:6px;border:1px solid rgba(139,157,106,.16);background:rgba(18,24,16,.82);color:var(--muted);font-size:.8rem;line-height:1.65}
      .journal-helper strong{color:var(--accent-bright)}
      .journal-form{display:grid;gap:10px}
      .journal-form input[type=password]{width:100%;box-sizing:border-box;background:var(--bg2);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:11px 12px;font-family:'Inter',sans-serif;font-size:.94rem;line-height:1.5}
      .journal-form input[type=password]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 1px rgba(139,157,106,.22)}
      .journal-form textarea{width:100%;min-height:120px;box-sizing:border-box;background:var(--bg2);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:11px 12px;font-family:'Inter',sans-serif;font-size:.96rem;line-height:1.6;resize:vertical}
      .journal-form textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 1px rgba(139,157,106,.22)}
      .journal-form textarea:disabled{opacity:.6;cursor:not-allowed}
      .journal-moderation-shell{display:grid;gap:10px;padding:12px;border:1px solid rgba(139,157,106,.14);border-radius:6px;background:rgba(18,24,16,.68)}
      .journal-moderation-head{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
      .journal-moderation-form{gap:8px}
      .journal-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
      .journal-btn{font-family:'JetBrains Mono',monospace;font-size:.76rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:6px;padding:8px 14px;border:1px solid var(--accent2);cursor:pointer;transition:all .15s}
      .journal-btn.primary{background:var(--accent2);color:#fff}
      .journal-btn.primary:hover{background:var(--accent)}
      .journal-btn.secondary{background:transparent;color:var(--accent-bright);border-color:var(--border2)}
      .journal-btn.secondary:hover{border-color:var(--accent);color:var(--accent)}
      .journal-btn:disabled{opacity:.45;cursor:not-allowed}
      .journal-status{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.7px;text-transform:uppercase;color:var(--muted)}
      .journal-status.is-success{color:var(--accent-bright)}
      .journal-status.is-error{color:var(--danger)}
      .journal-list{display:grid;gap:10px;max-height:480px;overflow:auto;padding-right:2px}
      .journal-empty{padding:12px;border:1px dashed var(--border);border-radius:6px;color:var(--muted);font-size:.84rem;line-height:1.6;text-align:center}
      .journal-item{padding:12px 14px;border:1px solid rgba(139,157,106,.14);border-radius:6px;background:rgba(18,24,16,.72);display:grid;gap:8px}
      .journal-item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap}
      .journal-item-author{color:var(--accent-bright);font-family:'JetBrains Mono',monospace;font-size:.76rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
      .journal-item-date{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.66rem;letter-spacing:.6px;text-transform:uppercase}
      .journal-item-passage{display:inline-flex;align-items:center;max-width:100%;padding:4px 8px;border-radius:999px;background:rgba(139,157,106,.12);border:1px solid rgba(139,157,106,.14);color:var(--sand);font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.5px;line-height:1.4;word-break:break-word}
      .journal-item-body{color:var(--text);font-size:.92rem;line-height:1.75;white-space:pre-line;word-break:break-word}
      .journal-item-delete{align-self:start;background:transparent;color:var(--muted);border:1px solid var(--border2);border-radius:4px;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:.64rem;letter-spacing:.8px;text-transform:uppercase;cursor:pointer}
      .journal-item-delete:hover{border-color:var(--accent);color:var(--accent-bright)}

      /* ── RESPONSIVE ── */
      @media(max-width:600px){
        .bible-wrap{padding:10px}
        .bible-controls{padding:10px;gap:6px;flex-direction:column;align-items:stretch}
        .bible-controls select{min-width:100%;width:100%}
        .bible-controls button{width:100%}
        .bible-nav{gap:4px}
        .bible-nav button{font-size:.7rem;padding:5px 10px}
        .bsc-row{flex-direction:column !important;align-items:stretch !important}
        .bsc-row input{flex:none !important;width:100% !important;min-width:0 !important}
        .bsc-row button{width:100%}
        .bsc-row select{width:100%}
        .bsc-lbl{display:none}
        .bible-text{padding:14px 12px;font-size:.88rem;line-height:1.7}
        .bible-audio-bar{padding:8px;gap:5px}
        .bible-audio-bar button{font-size:.68rem;padding:5px 10px}
        .bible-audio-bar select{font-size:.68rem}
        .bible-audio-bar input[type=range]{width:60px}
        .bible-bookmarks button{font-size:.64rem;padding:3px 7px}
        .bible-display-tools{padding:10px 12px}
        .bible-display-tool-group{min-width:0;width:100%}
        .bible-color-wheel-controls{width:100%;justify-content:space-between}
        .bible-color-reset{flex:1 1 auto;text-align:center}
        .bible-journal-shell{margin-top:28px;padding:16px 14px}
        .bible-journal-grid{grid-template-columns:1fr}
        .journal-card{padding:14px}
        .journal-actions{flex-direction:column;align-items:stretch}
        .journal-btn{width:100%;min-height:40px}
      }
      @media(max-width:400px){
        .bible-wrap{padding:6px}
        .bible-text{padding:10px 8px;font-size:.82rem}
        .bible-audio-bar{flex-direction:column}
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <a href="/truth" class="delta-logo" aria-hidden="true" title="" style="text-decoration:none">

        <div class="bible-bookmarks" id="bookmarks-bar">

        <div class="bible-audio-bar" id="bible-audio-bar">

        <div class="bible-text" id="bible-text">
          <div class="loading">Select a book and chapter, then press LOAD...</div>
        </div>

    <script>
    (function(){
      // ══════════════════════════════════════════════════════════
      // BIBLE DATA — Books & Chapter Counts
      // ══════════════════════════════════════════════════════════
      const BOOKS = [
        {name:'Genesis',abbr:'Genesis',ch:50},{name:'Exodus',abbr:'Exodus',ch:40},{name:'Leviticus',abbr:'Leviticus',ch:27},
        {name:'Numbers',abbr:'Numbers',ch:36},{name:'Deuteronomy',abbr:'Deuteronomy',ch:34},{name:'Joshua',abbr:'Joshua',ch:24},
        {name:'Judges',abbr:'Judges',ch:21},{name:'Ruth',abbr:'Ruth',ch:4},{name:'1 Samuel',abbr:'1Samuel',ch:31},
        {name:'2 Samuel',abbr:'2Samuel',ch:24},{name:'1 Kings',abbr:'1Kings',ch:22},{name:'2 Kings',abbr:'2Kings',ch:25},
        {name:'1 Chronicles',abbr:'1Chronicles',ch:29},{name:'2 Chronicles',abbr:'2Chronicles',ch:36},
        {name:'Ezra',abbr:'Ezra',ch:10},{name:'Nehemiah',abbr:'Nehemiah',ch:13},{name:'Esther',abbr:'Esther',ch:10},
        {name:'Job',abbr:'Job',ch:42},{name:'Psalms',abbr:'Psalms',ch:150},{name:'Proverbs',abbr:'Proverbs',ch:31},
        {name:'Ecclesiastes',abbr:'Ecclesiastes',ch:12},{name:'Song of Solomon',abbr:'SongofSolomon',ch:8},
        {name:'Isaiah',abbr:'Isaiah',ch:66},{name:'Jeremiah',abbr:'Jeremiah',ch:52},{name:'Lamentations',abbr:'Lamentations',ch:5},
        {name:'Ezekiel',abbr:'Ezekiel',ch:48},{name:'Daniel',abbr:'Daniel',ch:12},{name:'Hosea',abbr:'Hosea',ch:14},
        {name:'Joel',abbr:'Joel',ch:3},{name:'Amos',abbr:'Amos',ch:9},{name:'Obadiah',abbr:'Obadiah',ch:1},
        {name:'Jonah',abbr:'Jonah',ch:4},{name:'Micah',abbr:'Micah',ch:7},{name:'Nahum',abbr:'Nahum',ch:3},
        {name:'Habakkuk',abbr:'Habakkuk',ch:3},{name:'Zephaniah',abbr:'Zephaniah',ch:3},{name:'Haggai',abbr:'Haggai',ch:2},
        {name:'Zechariah',abbr:'Zechariah',ch:14},{name:'Malachi',abbr:'Malachi',ch:4},
        // New Testament
        {name:'Matthew',abbr:'Matthew',ch:28},{name:'Mark',abbr:'Mark',ch:16},{name:'Luke',abbr:'Luke',ch:24},
        {name:'John',abbr:'John',ch:21},{name:'Acts',abbr:'Acts',ch:28},{name:'Romans',abbr:'Romans',ch:16},
        {name:'1 Corinthians',abbr:'1Corinthians',ch:16},{name:'2 Corinthians',abbr:'2Corinthians',ch:13},
        {name:'Galatians',abbr:'Galatians',ch:6},{name:'Ephesians',abbr:'Ephesians',ch:6},
        {name:'Philippians',abbr:'Philippians',ch:4},{name:'Colossians',abbr:'Colossians',ch:4},
        {name:'1 Thessalonians',abbr:'1Thessalonians',ch:5},{name:'2 Thessalonians',abbr:'2Thessalonians',ch:3},
        {name:'1 Timothy',abbr:'1Timothy',ch:6},{name:'2 Timothy',abbr:'2Timothy',ch:4},
        {name:'Titus',abbr:'Titus',ch:3},{name:'Philemon',abbr:'Philemon',ch:1},
        {name:'Hebrews',abbr:'Hebrews',ch:13},{name:'James',abbr:'James',ch:5},
        {name:'1 Peter',abbr:'1Peter',ch:5},{name:'2 Peter',abbr:'2Peter',ch:3},
        {name:'1 John',abbr:'1John',ch:5},{name:'2 John',abbr:'2John',ch:1},{name:'3 John',abbr:'3John',ch:1},
        {name:'Jude',abbr:'Jude',ch:1},{name:'Revelation',abbr:'Revelation',ch:22}
      ];

      const bookSel = document.getElementById('book');
      const chapSel = document.getElementById('chapter');
      const transSel = document.getElementById('translation');
      const textDiv = document.getElementById('bible-text');

      // Populate book selector
      BOOKS.forEach((b,i) => {
        const o = document.createElement('option');
        o.value = i;
        o.textContent = b.name;
        bookSel.appendChild(o);
      });

      // Update chapters when book changes
      function updateChapters(){
        const b = BOOKS[bookSel.value];
        chapSel.innerHTML = '';
        for(let c=1; c<=b.ch; c++){
          const o = document.createElement('option');
          o.value = c;
          o.textContent = 'Chapter ' + c;
          chapSel.appendChild(o);
        }
      }
      bookSel.addEventListener('change', updateChapters);
      updateChapters();

      // Load chapter
      async function loadChapter(){
        if(typeof stopAudio === 'function') stopAudio();
        const b = BOOKS[bookSel.value];
        const ch = chapSel.value;
        const trans = transSel.value;
        textDiv.innerHTML = '<div class="loading">RECEIVING SIGNAL... Loading ' + b.name + ' ' + ch + '...</div>';

        try {
          const ref = encodeURIComponent(b.name + ' ' + ch);
          const resp = await fetch('/api/bible?ref=' + ref + '&translation=' + trans);
          const data = await resp.json();
          if(data.error){
            textDiv.innerHTML = '<div class="error">&#x26A0; ' + data.error + '</div>';
            return;
          }
          renderVerses(data, b.name + ' ' + ch);
        } catch(e){
          textDiv.innerHTML = '<div class="error">&#x26A0; COMMS FAILURE: ' + e.message + '</div>';
        }
      }

      function renderVerses(data, title){
        const translationId = (data.translation_id || transSel.value || '').toLowerCase();
        let html = '<div class="chapter-title">&#x2720; ' + title.toUpperCase() + ' [' + transSel.options[transSel.selectedIndex].text.split(' — ')[0] + ']</div>';
        if(data.verses && data.verses.length){
          data.verses.forEach(v => {
            const verseKey = buildBibleVerseHighlightKey(v, translationId);
            const highlightAttrs = verseKey
              ? ' class="verse is-highlightable" data-bible-highlight-key="' + verseKey + '" title="Click to highlight this verse"'
              : ' class="verse"';
            html += '<div' + highlightAttrs + '><span class="verse-num">' + v.verse + '</span>' + escapeHtml(v.text) + '</div>';
          });
        } else if(data.text){
          html += '<div class="verse">' + escapeHtml(data.text) + '</div>';
        } else {
          html += '<div class="error">No text found for this reference.</div>';
        }
        textDiv.innerHTML = html;
        textDiv.scrollTop = 0;
        bindBibleVerseHighlighting();
        refreshRenderedBibleHighlights(textDiv);
      }

      function buildBibleVerseHighlightKey(verseRow, translationId){
        const bookId = String(verseRow.book_id || verseRow.book_name || '').trim();
        const chapter = verseRow.chapter || chapSel.value || '';
        const verse = verseRow.verse || '';
        const translation = String(translationId || transSel.value || '').trim().toLowerCase();
        if(!bookId || !chapter || !verse || !translation) return '';
        return translation + '|' + bookId + '|' + chapter + '|' + verse;
      }

      function bindBibleVerseHighlighting(){
        textDiv.querySelectorAll('[data-bible-highlight-key]').forEach((verseEl) => {
          verseEl.addEventListener('click', () => {
            toggleBibleVerseHighlight(verseEl.getAttribute('data-bible-highlight-key') || '', textDiv);
          });
        });
      }

      function escapeHtml(t){
        const d = document.createElement('div');
        d.textContent = t;
        return d.innerHTML;
      }

      document.getElementById('btn-load').addEventListener('click', loadChapter);

      // Prev / Next chapter
      document.getElementById('prev-ch').addEventListener('click', () => {
        let ci = parseInt(chapSel.value);
        let bi = parseInt(bookSel.value);
        if(ci > 1){ chapSel.value = ci - 1; }
        else if(bi > 0){ bookSel.value = bi - 1; updateChapters(); chapSel.value = BOOKS[bi-1].ch; }
        else return;
        loadChapter();
      });
      document.getElementById('next-ch').addEventListener('click', () => {
        let ci = parseInt(chapSel.value);
        let bi = parseInt(bookSel.value);
        const maxCh = BOOKS[bi].ch;
        if(ci < maxCh){ chapSel.value = ci + 1; }
        else if(bi < BOOKS.length - 1){ bookSel.value = bi + 1; updateChapters(); }
        else return;
        loadChapter();
      });

      // Bookmarks
      function loadBookmarks(){
        try { return JSON.parse(localStorage.getItem('deltaBibleBookmarks')) || []; } catch(e){ return []; }
      }
      function saveBookmarks(bm){ localStorage.setItem('deltaBibleBookmarks', JSON.stringify(bm)); }
      function renderBookmarks(){
        const bar = document.getElementById('bookmarks-bar');
        bar.innerHTML = '<span class="bm-title">&#x2605; BOOKMARKS:</span>';
        const bm = loadBookmarks();
        if(!bm.length){ bar.innerHTML += '<span style="color:var(--muted);font-size:.72rem;font-family:JetBrains Mono,monospace">None saved</span>'; return; }
        bm.forEach((b,i) => {
          const btn = document.createElement('button');
          btn.textContent = b.label;
          btn.title = 'Click to load, Shift+Click to remove';
          btn.addEventListener('click', e => {
            if(e.shiftKey){ const bm2 = loadBookmarks(); bm2.splice(i,1); saveBookmarks(bm2); renderBookmarks(); return; }
            bookSel.value = b.bookIdx;
            updateChapters();
            chapSel.value = b.chapter;
            transSel.value = b.translation || 'web';
            loadChapter();
          });
          bar.appendChild(btn);
        });
        // Add bookmark button
        const addBtn = document.createElement('button');
        addBtn.textContent = '+ ADD';
        addBtn.style.color = 'var(--accent)';
        addBtn.addEventListener('click', () => {
          const bm = loadBookmarks();
          const b = BOOKS[bookSel.value];
          const label = b.name + ' ' + chapSel.value;
          if(bm.find(x => x.label === label)) return;
          bm.push({label, bookIdx: parseInt(bookSel.value), chapter: parseInt(chapSel.value), translation: transSel.value});
          saveBookmarks(bm);
          renderBookmarks();
        });
        bar.appendChild(addBtn);
      }
      renderBookmarks();

      // Keyboard shortcuts
      document.addEventListener('keydown', e => {
        if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
        if(e.key === 'ArrowLeft'){ document.getElementById('prev-ch').click(); }
        if(e.key === 'ArrowRight'){ document.getElementById('next-ch').click(); }
      });
    })();
    </script>

    <!-- RADIO FOOTER SCRIPT -->
    <script>
    (function(){
      const au=document.getElementById('rf-audio'),sel=document.getElementById('rf-station'),now=document.getElementById('rf-now'),viz=document.getElementById('rf-viz'),vol=document.getElementById('rf-vol');
      let vizI=null,bars=[],userPaused=false;
      for(let i=0;i<12;i++){const b=document.createElement('div');b.className='rf-bar';viz.appendChild(b);bars.push(b);}
      function saveState(){localStorage.setItem('deltaRadio',JSON.stringify({src:au.src||'',vol:vol.value,playing:!au.paused&&!userPaused,station:sel.value,name:now.textContent}));}
      function startV(){clearInterval(vizI);vizI=setInterval(()=>{bars.forEach(b=>{b.style.height=(2+Math.random()*14)+'px';});},120);}
      function stopV(){clearInterval(vizI);bars.forEach(b=>{b.style.height='2px';});}
      au.addEventListener('pause',()=>{if(!userPaused&&au.src){setTimeout(()=>{if(!userPaused&&au.src)au.play().catch(()=>{});},100);}});
      sel.addEventListener('change',()=>{if(!sel.value){userPaused=true;au.pause();au.src='';now.textContent='NO SIGNAL';stopV();saveState();return;}userPaused=false;au.src=sel.value;au.play().catch(()=>{});now.textContent=sel.options[sel.selectedIndex].text;startV();saveState();});
      document.getElementById('rf-play').addEventListener('click',()=>{if(!au.src)return;if(au.paused){userPaused=false;au.play().catch(()=>{});startV();}else{userPaused=true;au.pause();stopV();}saveState();});
      document.getElementById('rf-stop').addEventListener('click',()=>{userPaused=true;au.pause();au.src='';sel.value='';now.textContent='NO SIGNAL';stopV();saveState();});
      vol.addEventListener('input',()=>{au.volume=vol.value/100;saveState();});
      document.addEventListener('visibilitychange',()=>{if(!document.hidden&&au.src&&!userPaused){au.play().catch(()=>{});startV();}});
      // Restore state on load
      try{const s=JSON.parse(localStorage.getItem('deltaRadio'));if(s&&s.src&&s.playing){sel.value=s.station||'';vol.value=s.vol||60;au.volume=(s.vol||60)/100;au.src=s.src;userPaused=false;au.play().then(()=>{now.textContent=s.name||sel.options[sel.selectedIndex]?.text||'RECEIVING';startV();}).catch(()=>{now.textContent=s.name||'SIGNAL READY (tap play)';sel.value=s.station||'';});}else if(s){sel.value=s.station||'';vol.value=s.vol||60;au.volume=(s.vol||60)/100;if(s.station){au.src=s.src;now.textContent=s.name||'PAUSED';userPaused=true;}}}catch(e){}
    })();
    </script>
  </body>
</html>
