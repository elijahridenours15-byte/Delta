<style>
* {
  box-sizing: border-box;
}

.culture-build-page {
  width: 100%;
  flex: 1 0 auto;
  background:
    radial-gradient(circle at 12% 18%, rgba(164,184,122,.14), transparent 30%),
    radial-gradient(circle at 84% 8%, rgba(196,162,101,.14), transparent 24%),
    linear-gradient(180deg, rgba(10,13,9,.96), rgba(14,17,11,.98));
  color: var(--text);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
}

.culture-hero {
  width: min(1280px, calc(100% - 32px));
  margin: 18px auto 0;
}

.hero-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
  align-items: stretch;
}

.hero-content,
.hero-panel {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border2);
  border-radius: 20px;
  background: linear-gradient(180deg, rgba(26,31,22,.96), rgba(16,20,14,.94));
  box-shadow: 0 20px 40px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.03);
}

.hero-content::before,
.hero-panel::before,
.culture-section::before {
  content: '';
  position: absolute;
  inset: 0 0 auto 0;
  height: 2px;
  background: linear-gradient(90deg, rgba(164,184,122,.48), rgba(196,162,101,.3), transparent);
}

.hero-content {
  padding: 28px;
}

.hero-content::after {
  content: '';
  position: absolute;
  right: -120px;
  bottom: -120px;
  width: 320px;
  height: 320px;
  background: radial-gradient(circle, rgba(164,184,122,.12), transparent 68%);
  pointer-events: none;
}

.hero-kicker,
.hero-panel-label {
  display: inline-flex;
  align-items: center;
  width: max-content;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid rgba(164,184,122,.22);
  background: rgba(17,23,15,.86);
  color: var(--accent-bright);
  font: 800 10px/1 'JetBrains Mono', monospace;
  letter-spacing: 1.4px;
  text-transform: uppercase;
}

.hero-content h1 {
  margin: 16px 0 12px;
  font: 900 clamp(2.2rem, 4vw, 3.4rem)/1.05 'JetBrains Mono', monospace;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--accent-bright);
}

.subtitle {
  max-width: 720px;
  margin: 0;
  font-size: 1.05rem;
  line-height: 1.7;
  color: var(--text2);
}

.hero-highlights {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 20px;
}

.hero-chip {
  display: inline-flex;
  align-items: center;
  padding: 7px 12px;
  border-radius: 999px;
  background: rgba(196,162,101,.1);
  border: 1px solid rgba(196,162,101,.18);
  color: var(--sand);
  font: 700 11px/1 'JetBrains Mono', monospace;
  letter-spacing: .8px;
  text-transform: uppercase;
}

.hero-panel {
  padding: 24px;
}

.hero-panel-list {
  margin: 14px 0 0;
  padding-left: 18px;
  display: grid;
  gap: 12px;
}

.hero-panel-list li {
  color: var(--text2);
  line-height: 1.65;
}

.culture-tabs {
  width: min(1280px, calc(100% - 32px));
  margin: 18px auto 0;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 18px;
  background: rgba(12,16,10,.82);
  backdrop-filter: blur(12px);
}

.culture-tabs-stealth {
  display: none;
  width: min(1280px, calc(100% - 32px));
  margin: 18px auto 0;
  border: 1px solid rgba(107,127,78,.38);
  border-radius: 18px;
  background: rgba(12,16,10,.82);
  backdrop-filter: blur(12px);
  overflow: hidden;
}

.culture-tabs-stealth-summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  list-style: none;
  color: #eef6d8;
  background: linear-gradient(180deg, rgba(84,101,52,.94), rgba(37,48,24,.98));
  border-radius: 16px;
  font: 700 0.84rem/1 'JetBrains Mono', monospace;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.culture-tabs-stealth-summary::-webkit-details-marker {
  display: none;
}

.culture-tabs-stealth-summary::after {
  content: '▾';
  color: #f3f8df;
  font-size: 0.85rem;
  transition: transform .2s ease;
}

.culture-tabs-stealth[open] .culture-tabs-stealth-summary::after {
  transform: rotate(180deg);
}

.culture-tabs-stealth-label {
  color: rgba(241,246,231,.82);
}

.culture-tabs-stealth-current {
  color: #f3f8df;
}

.culture-tabs-stealth-menu {
  display: grid;
  gap: 8px;
  padding: 10px;
}

.tab-button {
  padding: 0.8rem 1.2rem;
  background: linear-gradient(180deg, rgba(72,88,46,.82), rgba(27,36,21,.96));
  color: #e2ebcb;
  border: 1px solid rgba(107,127,78,.42);
  border-radius: 999px;
  cursor: pointer;
  font: 700 0.82rem/1 'JetBrains Mono', monospace;
  letter-spacing: 1px;
  text-transform: uppercase;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
  transition: transform .25s ease, border-color .25s ease, background .25s ease, color .25s ease, box-shadow .25s ease;
}

.tab-button:hover {
  background: linear-gradient(180deg, rgba(93,114,56,.9), rgba(41,54,27,.98));
  border-color: rgba(164,184,122,.56);
  color: #f2f6e7;
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(107,127,78,.22);
}

.tab-button.active {
  background: linear-gradient(180deg, rgba(116,140,69,.96), rgba(61,76,35,.98));
  color: #f5f8ec;
  border-color: rgba(200,213,163,.82);
  box-shadow: 0 12px 24px rgba(107,127,78,.3);
}

.culture-stealth-option {
  width: 100%;
  padding: 0.85rem 1rem;
  border-radius: 14px;
  border: 1px solid rgba(107,127,78,.38);
  background: linear-gradient(180deg, rgba(68,82,44,.82), rgba(24,32,19,.96));
  color: #dce8be;
  cursor: pointer;
  font: 700 0.82rem/1.2 'JetBrains Mono', monospace;
  letter-spacing: .9px;
  text-transform: uppercase;
  transition: background .2s ease, border-color .2s ease, color .2s ease, box-shadow .2s ease;
}

.culture-stealth-option:hover,
.culture-stealth-option.active {
  background: linear-gradient(180deg, rgba(110,130,63,.96), rgba(58,72,33,.98));
  border-color: rgba(200,213,163,.82);
  color: #f5f8ec;
  box-shadow: 0 10px 20px rgba(107,127,78,.24);
}

.culture-content {
  width: min(1280px, calc(100% - 32px));
  margin: 0 auto;
  padding: 22px 0 32px;
}

.country-section {
  display: none;
  animation: fadeIn .25s ease-out;
}

.country-section.active {
  display: block;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.country-title {
  font: 800 clamp(1.7rem, 3vw, 2.45rem)/1.1 'JetBrains Mono', monospace;
  letter-spacing: .03em;
  text-transform: uppercase;
  color: var(--sand);
  margin: 0 0 2rem;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(164,184,122,.2);
}

.culture-section {
  position: relative;
  overflow: hidden;
  margin: 18px 0;
  padding: 22px;
  background: linear-gradient(180deg, rgba(24,29,20,.96), rgba(15,18,13,.95));
  border: 1px solid var(--border2);
  border-radius: 18px;
  box-shadow: 0 18px 34px rgba(0,0,0,.18);
}

.culture-section h3 {
  font: 800 clamp(1.2rem, 2vw, 1.6rem)/1.2 'JetBrains Mono', monospace;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--accent-bright);
  margin: 0 0 16px;
}

.rank-subsection-head {
  display: grid;
  gap: 6px;
  padding: 14px 16px;
  margin: 0 0 14px;
  border-radius: 14px;
  border: 1px solid rgba(164,184,122,.14);
  background: linear-gradient(180deg, rgba(17,22,15,.92), rgba(11,14,10,.82));
}

.ranks-grid + .rank-subsection-head {
  margin-top: 22px;
}

.rank-subsection-kicker {
  color: var(--accent-soft);
  font: 700 11px/1 'JetBrains Mono', monospace;
  letter-spacing: 1.4px;
  text-transform: uppercase;
}

.rank-subsection-title {
  margin: 0;
  font: 700 1rem/1.35 'JetBrains Mono', monospace;
  color: var(--text);
}

.rank-subsection-copy {
  margin: 0;
  color: var(--muted);
  font-size: 0.93rem;
  line-height: 1.6;
}

.ranks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 16px;
}

.ranks-grid-enlisted .rank-insignia-art {
  height: 132px;
  padding: 8px;
}

.rank-card {
  --rank-accent: var(--accent-bright);
  --rank-panel: rgba(18,22,16,.92);
  --rank-header: rgba(164,184,122,.16);
  --rank-metal: #eef2e0;
  --rank-glow: rgba(164,184,122,.24);
  display: grid;
  gap: 14px;
  padding: 18px;
  background: linear-gradient(180deg, rgba(31,38,25,.82), rgba(18,22,16,.96));
  border: 1px solid rgba(164,184,122,.18);
  border-radius: 16px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
  transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
}

.rank-card:hover {
  border-color: rgba(164,184,122,.42);
  box-shadow: 0 18px 30px rgba(0,0,0,.2);
  transform: translateY(-4px);
}

.rank-card-iran {
  --rank-accent: #74d1a4;
  --rank-header: rgba(116,209,164,.16);
  --rank-glow: rgba(116,209,164,.26);
  --rank-metal: #effff5;
}

.rank-card-china {
  --rank-accent: #f2c35e;
  --rank-header: rgba(242,195,94,.18);
  --rank-glow: rgba(242,195,94,.24);
  --rank-metal: #fff6dd;
}

.rank-card-russia {
  --rank-accent: #82b8ff;
  --rank-header: rgba(130,184,255,.16);
  --rank-glow: rgba(130,184,255,.24);
  --rank-metal: #eef6ff;
}

.rank-card-mexico {
  --rank-accent: #d98a5a;
  --rank-header: rgba(217,138,90,.18);
  --rank-glow: rgba(217,138,90,.24);
  --rank-metal: #fff0e6;
}

.rank-card-israel {
  --rank-accent: #8fdcff;
  --rank-header: rgba(143,220,255,.18);
  --rank-glow: rgba(143,220,255,.24);
  --rank-metal: #eefbff;
}

.rank-card-usa {
  --rank-accent: #c8d5a3;
  --rank-header: rgba(200,213,163,.18);
  --rank-glow: rgba(164,184,122,.26);
  --rank-metal: #f5f8ec;
}

.rank-insignia-shell {
  display: grid;
  gap: 10px;
  padding: 14px;
  border-radius: 14px;
  background: linear-gradient(180deg, rgba(9,12,9,.72), rgba(18,23,17,.92));
  border: 1px solid rgba(255,255,255,.04);
}

.rank-insignia-badge {
  display: inline-flex;
  width: max-content;
  align-items: center;
  justify-content: center;
  padding: 5px 9px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.04);
  color: var(--rank-metal);
  font: 700 10px/1 'JetBrains Mono', monospace;
  letter-spacing: 1.1px;
  text-transform: uppercase;
}

.rank-insignia-art {
  width: 100%;
  display: block;
  height: 148px;
  object-fit: contain;
  object-position: center;
  padding: 10px;
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(8,10,8,.92), rgba(18,23,17,.84));
  border: 1px solid rgba(255,255,255,.05);
  filter: drop-shadow(0 10px 14px rgba(0,0,0,.18));
}

.rank-insignia-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.rank-tier {
  display: inline-flex;
  width: max-content;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.06);
  color: var(--rank-metal);
  font: 700 10px/1 'JetBrains Mono', monospace;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.rank-actual {
  color: var(--rank-metal);
  font: 700 10px/1.5 'JetBrains Mono', monospace;
  letter-spacing: .7px;
  text-transform: uppercase;
}

.rank-match-note {
  color: var(--text2);
  font-size: 0.82rem;
  line-height: 1.55;
}

.rank-source {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  color: var(--muted);
  font: 700 10px/1.5 'JetBrains Mono', monospace;
  letter-spacing: .6px;
}

.rank-source a {
  color: var(--rank-accent);
  text-decoration: none;
}

.rank-source a:hover {
  color: var(--rank-metal);
}

.rank-copy {
  display: grid;
  gap: 6px;
}

.rank-title {
  font-size: 1.12rem;
  font-weight: 700;
  color: var(--text);
  margin: 0;
}

.rank-title-native {
  font-size: 1rem;
  font-weight: 600;
  color: var(--sand);
  margin: 0;
}

.rank-phonetic {
  font-size: 0.92rem;
  color: var(--text2);
  font-style: italic;
  margin: 0;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.usa-branch-deck {
  display: grid;
  gap: 16px;
}

.usa-branch-selector {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
  gap: 12px;
}

.usa-branch-button {
  display: grid;
  place-items: center;
  aspect-ratio: 1 / 1;
  padding: 14px;
  border-radius: 16px;
  border: 1px solid rgba(164,184,122,.16);
  background: linear-gradient(180deg, rgba(24,29,20,.94), rgba(11,14,10,.96));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
  cursor: pointer;
  transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease, background .25s ease;
}

.usa-branch-button:hover,
.usa-branch-button:focus-visible {
  transform: translateY(-3px);
  border-color: rgba(164,184,122,.42);
  background: linear-gradient(180deg, rgba(37,46,29,.96), rgba(13,17,12,.98));
  box-shadow: 0 16px 26px rgba(0,0,0,.18);
  outline: none;
}

.usa-branch-button.active {
  border-color: rgba(200,213,163,.6);
  background: linear-gradient(180deg, rgba(55,68,39,.96), rgba(18,24,15,.98));
  box-shadow: 0 18px 28px rgba(0,0,0,.22), inset 0 0 0 1px rgba(243,248,223,.08);
}

.usa-branch-button img {
  width: min(100%, 72px);
  height: 72px;
  object-fit: contain;
  object-position: center;
  filter: drop-shadow(0 8px 14px rgba(0,0,0,.2));
}

.usa-branch-panels {
  display: grid;
}

.usa-branch-panel {
  display: grid;
  gap: 18px;
  padding: 18px;
  border-radius: 18px;
  border: 1px solid rgba(164,184,122,.16);
  background: linear-gradient(180deg, rgba(20,25,18,.96), rgba(12,16,11,.98));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.03), 0 18px 34px rgba(0,0,0,.18);
}

.usa-branch-panel-head {
  display: grid;
  gap: 6px;
}

.usa-branch-panel-kicker {
  color: var(--accent-soft);
  font: 700 11px/1 'JetBrains Mono', monospace;
  letter-spacing: 1.2px;
  text-transform: uppercase;
}

.usa-branch-panel-title {
  margin: 0;
  font: 800 1.05rem/1.3 'JetBrains Mono', monospace;
  text-transform: uppercase;
  color: var(--text);
}

.usa-branch-panel-copy {
  margin: 0;
  color: var(--muted);
  font-size: 0.93rem;
  line-height: 1.6;
}

.usa-branch-panel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  align-items: stretch;
}

.usa-branch-media {
  display: grid;
  gap: 12px;
  margin: 0;
  padding: 16px;
  border-radius: 16px;
  border: 1px solid rgba(164,184,122,.14);
  background: rgba(13,18,13,.82);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
}

.usa-branch-media-label {
  color: var(--sand);
  font: 700 10px/1 'JetBrains Mono', monospace;
  letter-spacing: 1.1px;
  text-transform: uppercase;
}

.usa-branch-insignia-art,
.usa-branch-face-art {
  width: 100%;
  display: block;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.05);
  background: linear-gradient(180deg, rgba(8,10,8,.92), rgba(18,23,17,.84));
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
}

.usa-branch-insignia-art {
  height: 180px;
  object-fit: contain;
  object-position: center;
  padding: 16px;
}

.usa-branch-face-art {
  height: 280px;
  object-fit: contain;
  object-position: center top;
  padding: 10px;
}

.usa-branch-photo-caption {
  color: var(--text2);
  font-size: 0.86rem;
  line-height: 1.55;
}

.usa-branch-source {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  color: var(--muted);
  font: 700 10px/1.5 'JetBrains Mono', monospace;
  letter-spacing: .6px;
}

.usa-branch-source a {
  color: var(--accent-bright);
  text-decoration: none;
}

.usa-branch-source a:hover {
  color: var(--text);
}

.leadership-overview-head {
  display: grid;
  gap: 8px;
  margin-bottom: 18px;
}

.leadership-kicker {
  color: var(--accent-soft);
  font: 700 11px/1 'JetBrains Mono', monospace;
  letter-spacing: 1.2px;
  text-transform: uppercase;
}

.leadership-copy {
  margin: 0;
  max-width: 820px;
  color: var(--text2);
  font-size: 0.96rem;
  line-height: 1.7;
}

.leadership-match-shell {
  margin-bottom: 18px;
  border: 1px solid rgba(164,184,122,.16);
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(20,25,18,.94), rgba(12,16,11,.98));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.03), 0 18px 30px rgba(0,0,0,.16);
  overflow: hidden;
}

.leadership-match-label {
  padding: 14px 18px 0;
  color: var(--sand);
  font: 700 10px/1 'JetBrains Mono', monospace;
  letter-spacing: 1.2px;
  text-transform: uppercase;
}

.leadership-match-table-wrap {
  overflow-x: auto;
}

.leadership-match-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 620px;
}

.leadership-match-table th,
.leadership-match-table td {
  padding: 14px 18px;
  border-top: 1px solid rgba(164,184,122,.12);
  text-align: left;
  vertical-align: top;
}

.leadership-match-table thead th {
  color: var(--accent-soft);
  font: 700 11px/1.35 'JetBrains Mono', monospace;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.leadership-match-table tbody th {
  color: var(--accent-bright);
  font: 800 0.98rem/1.35 'JetBrains Mono', monospace;
  letter-spacing: .03em;
  text-transform: uppercase;
}

.leadership-match-table tbody td {
  color: var(--text);
  font-size: 0.96rem;
  line-height: 1.55;
}

.leadership-match-role,
.leadership-match-name {
  display: block;
}

.leadership-match-role {
  color: var(--sand);
  font: 700 10px/1.2 'JetBrains Mono', monospace;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.leadership-match-name {
  color: var(--text);
  font-weight: 700;
}

.leadership-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}

.leadership-card {
  display: grid;
  gap: 8px;
  padding: 18px;
  border-radius: 16px;
  border: 1px solid rgba(164,184,122,.16);
  background: linear-gradient(180deg, rgba(20,25,18,.96), rgba(12,16,11,.98));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.03), 0 18px 30px rgba(0,0,0,.18);
  transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
}

.leadership-card:hover {
  transform: translateY(-3px);
  border-color: rgba(196,162,101,.36);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 20px 34px rgba(0,0,0,.22);
}

.leadership-country {
  color: var(--accent-bright);
  font: 800 1rem/1.2 'JetBrains Mono', monospace;
  letter-spacing: .05em;
  text-transform: uppercase;
}

.leadership-role {
  color: var(--sand);
  font: 700 10px/1 'JetBrains Mono', monospace;
  letter-spacing: 1.1px;
  text-transform: uppercase;
}

.leadership-name {
  color: var(--text);
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.45;
}

.leadership-note {
  margin: 4px 0 0;
  padding-top: 10px;
  border-top: 1px solid rgba(164,184,122,.12);
  color: var(--text2);
  font-size: 0.88rem;
  line-height: 1.6;
