<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BatCode — AI Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <header class="hero">
      <div class="bat-logo" aria-hidden="true">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="64" height="64" rx="8" fill="#111"></rect>
          <path d="M8 36c6-8 14-10 24-2 10-8 18-6 24 2-6-2-12-2-18 4-6-6-12-6-18 0-6-6-12-6-18-4z" fill="#ffcc00"/>
        </svg>
      </div>
      <div class="title">
        <h1>BatCode — AI Agent</h1>
        <p class="tag">Free AI coding assistant powered by Hugging Face</p>
      </div>
      <nav class="top-nav">
        <a href="/">Playground</a>
        <a href="/cyber">Cyber Intel</a>
        <a href="/ai" class="active">AI Agent</a>
      </nav>
    </header>

    <main class="ai-container">
      <div class="ai-sidebar">
        <h3>Model</h3>
        <select id="modelSelect"></select>
        <p id="modelDesc" class="model-desc"></p>

        <h3>Settings</h3>
        <label class="ai-label">Temperature
          <input type="range" id="temperature" min="0.1" max="1.5" step="0.1" value="0.7" />
          <span id="tempVal">0.7</span>
        </label>
        <label class="ai-label">Max tokens
          <input type="number" id="maxTokens" value="512" min="64" max="2048" step="64" />
        </label>

        <h3>Quick Prompts</h3>
        <div class="quick-prompts">
          <button class="qp" data-prompt="Write a Python function that checks if a string is a palindrome">Palindrome check</button>
          <button class="qp" data-prompt="Explain how a binary search algorithm works step by step">Binary search</button>
          <button class="qp" data-prompt="Write a Flask REST API with CRUD operations for a todo list">Flask CRUD API</button>
          <button class="qp" data-prompt="Explain SQL injection and how to prevent it in Python">SQL injection</button>
          <button class="qp" data-prompt="Write a Python script to scan open ports on localhost">Port scanner</button>
          <button class="qp" data-prompt="Create a Python class for a linked list with insert, delete, and display methods">Linked list</button>
        </div>
      </div>

      <div class="ai-chat">
        <div id="chatLog" class="chat-log">
          <div class="chat-msg system">
            <span class="chat-role">BatAgent</span>
            <p>Ready. Ask me anything about coding, security, or software engineering. Powered by free Hugging Face models.</p>
          </div>
        </div>
        <div class="chat-input-row">
          <textarea id="chatInput" placeholder="Ask the AI agent… (e.g., 'Write a Python web scraper')" rows="2"></textarea>
          <button id="sendBtn">Send</button>
        </div>
        <div class="chat-status">
          <span id="chatStatus"></span>
        </div>
      </div>
    </main>

    <script>
      const chatLog = document.getElementById('chatLog');
      const chatInput = document.getElementById('chatInput');
      const statusEl = document.getElementById('chatStatus');
      const modelSelect = document.getElementById('modelSelect');
      const modelDesc = document.getElementById('modelDesc');
      const tempSlider = document.getElementById('temperature');
      const tempVal = document.getElementById('tempVal');
      const maxTokensEl = document.getElementById('maxTokens');

      tempSlider.addEventListener('input', () => tempVal.textContent = tempSlider.value);

      function esc(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
      }

      function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `chat-msg ${role}`;
        // Format code blocks
        let html = esc(text);
        html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre class="code-block"><code>$2</code></pre>');
        html = html.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
        html = html.replace(/\n/g, '<br>');
        div.innerHTML = `<span class="chat-role">${role === 'user' ? 'You' : 'BatAgent'}</span><div class="chat-text">${html}</div>`;
        chatLog.appendChild(div);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      // Load models
      async function loadModels() {
        try {
          const res = await fetch('/api/ai/models');
          const data = await res.json();
          if (data.ok) {
            data.models.forEach(m => {
              const opt = document.createElement('option');
              opt.value = m.id;
              opt.textContent = m.name;
              opt.dataset.desc = m.desc;
              opt.dataset.provider = m.provider;
              modelSelect.appendChild(opt);
            });
            updateModelDesc();
          }
        } catch (e) { console.warn(e); }
      }

      function updateModelDesc() {
        const opt = modelSelect.options[modelSelect.selectedIndex];
        modelDesc.textContent = opt ? opt.dataset.desc : '';
      }
      modelSelect.addEventListener('change', updateModelDesc);

      function getSelectedProvider() {
        const opt = modelSelect.options[modelSelect.selectedIndex];
        return opt ? opt.dataset.provider : 'pollinations';
      }

      async function sendMessage() {
        const prompt = chatInput.value.trim();
        if (!prompt) return;

        addMessage('user', prompt);
        chatInput.value = '';
        statusEl.textContent = 'Thinking…';

        const sendBtn = document.getElementById('sendBtn');
        sendBtn.disabled = true;

        try {
          const res = await fetch('/api/ai', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              prompt,
              model: modelSelect.value,
              provider: getSelectedProvider(),
              temperature: parseFloat(tempSlider.value),
              max_tokens: parseInt(maxTokensEl.value),
            })
          });
          const data = await res.json();
          if (data.ok) {
            addMessage('assistant', data.text);
            statusEl.textContent = `Model: ${data.model} (${data.provider})`;
          } else if (data.loading) {
            addMessage('system', data.error + ' Retrying…');
            statusEl.textContent = 'Model loading…';
            setTimeout(() => {
              chatInput.value = prompt;
              sendMessage();
            }, 15000);
            return;
          } else {
            addMessage('system', 'Error: ' + data.error);
            statusEl.textContent = '';
          }
        } catch (err) {
          addMessage('system', 'Network error: ' + err.message);
          statusEl.textContent = '';
        } finally {
          sendBtn.disabled = false;
        }
      }

      document.getElementById('sendBtn').addEventListener('click', sendMessage);
      chatInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });

      // Quick prompts
      document.querySelectorAll('.qp').forEach(btn => {
        btn.addEventListener('click', () => {
          chatInput.value = btn.dataset.prompt;
          sendMessage();
        });
      });

      loadModels();
    </script>
  </body>
</html>
