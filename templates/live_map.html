    <style>
      .live-map-wrap{display:flex;flex-direction:column;height:calc(100vh - 56px);min-height:400px}
      #live-map{flex:1;background:#0b0e09}
      .lm-panel{
        display:flex;align-items:center;gap:12px;flex-wrap:wrap;
        padding:8px 16px;background:var(--panel2);border-bottom:1px solid var(--border);
        font-family:'JetBrains Mono',monospace;
      }
      .lm-title{font:800 .7rem/1 'JetBrains Mono',monospace;letter-spacing:2px;text-transform:uppercase;color:var(--accent-bright)}
      .lm-tag{font:500 .58rem/1 'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
      .lm-count-badge{
        display:inline-flex;align-items:center;gap:5px;
        padding:4px 10px;border-radius:999px;
        background:rgba(164,184,122,.07);border:1px solid rgba(164,184,122,.18);
      }
      .lm-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-bright);box-shadow:0 0 6px var(--accent-glow);animation:pulse-dot 2.4s ease-in-out infinite;flex-shrink:0}
      .lm-n{font:800 .7rem/1 'JetBrains Mono',monospace;color:var(--accent-bright)}
      .lm-online-lbl{font:600 .52rem/1 'JetBrains Mono',monospace;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
      .lm-refresh{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:4px;cursor:pointer;font:700 .6rem/1 'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;transition:all .15s}
      .lm-refresh:hover{color:var(--accent-bright);border-color:var(--accent2)}
      .lm-spacer{flex:1}
      .lm-classif{font:700 .5rem/1 'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;color:rgba(164,184,122,.22);user-select:none}
      /* Leaflet popup matching site palette */
      .leaflet-popup-content-wrapper{background:var(--panel);border:1px solid var(--border2);border-radius:8px;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.5)}
      .leaflet-popup-tip-container{display:none}
      .leaflet-popup-content{margin:10px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7}
      .lm-popup-city{font-weight:800;color:var(--accent-bright);letter-spacing:.5px;font-size:12px}
      .lm-popup-country{color:var(--text2)}
      .lm-popup-n{color:var(--muted);font-size:10px;letter-spacing:.8px;text-transform:uppercase}
      .leaflet-control-zoom{border-color:var(--border) !important}
      .leaflet-control-zoom a{background:var(--panel) !important;color:var(--accent-bright) !important;border-color:var(--border) !important}
      .leaflet-control-zoom a:hover{background:var(--panel2) !important;color:var(--accent-bright) !important}
      /* empty state */
      .lm-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;pointer-events:none;z-index:400}
      .lm-empty-icon{font-size:2.2rem;opacity:.18}
      .lm-empty-txt{font:700 .7rem/1.6 'JetBrains Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);opacity:.5;text-align:center}
    </style>
  </head>
  <body>
    <header class="hero" style="padding:8px 18px">
      <a href="/truth" class="delta-logo" aria-hidden="true" title="" style="text-decoration:none;width:38px;height:38px">
        <svg width="38" height="38" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="64" height="64" rx="8" fill="#1a1f16"/>
          <path d="M32 10L54 50H10L32 10Z" fill="none" stroke="#8B9D6A" stroke-width="3"/>
          <path d="M32 20L46 46H18L32 20Z" fill="#8B9D6A" opacity="0.3"/>
          <line x1="32" y1="24" x2="32" y2="46" stroke="#C8D5A3" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="25" y1="32" x2="39" y2="32" stroke="#C8D5A3" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </a>
      <div class="title">
        <h1 style="font-size:16px;letter-spacing:3px">LIVE OPS MAP</h1>
        <p class="tag">REAL-TIME VISITOR GRID &bull; ACTIVE 5-MIN WINDOW</p>
      </div>
      {% include '_top_nav.html' %}
    </header>

    <main style="position:relative;flex:1;display:flex;flex-direction:column">
      <div class="lm-panel">
        <span class="lm-title">SIGINT GRID</span>
        <span class="lm-tag">LIVE OPERATORS</span>
        <span class="lm-count-badge">
          <span class="lm-dot"></span>
          <span class="lm-n" id="lm-count">—</span>
          <span class="lm-online-lbl">ONLINE</span>
        </span>
        <span class="lm-spacer"></span>
        <button class="lm-refresh" id="lm-refresh">REFRESH</button>
        <span class="lm-classif">&#9670; CLASSIFIED // FOUO</span>
      </div>
      <div class="live-map-wrap">
        <div id="live-map"></div>
      </div>
    </main>

    {% include '_radio_footer.html' %}

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" crossorigin=""></script>
    <script>
    (function () {
      // Dark tile layer — CartoDB Dark Matter (free, no key)
      const map = L.map('live-map', {
        center: [20, 10], zoom: 2,
        minZoom: 1, maxZoom: 10,
        zoomControl: true,
        attributionControl: true,
      });

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" style="color:#6b6b5e">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions" style="color:#6b6b5e">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19,
      }).addTo(map);

      // custom marker — olive glowing dot
      function makeIcon(n) {
        const sz = n === 1 ? 10 : n < 5 ? 13 : n < 20 ? 16 : 20;
        return L.divIcon({
          className: '',
          html: `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:#A4B87A;box-shadow:0 0 ${sz}px #A4B87A88,0 0 ${sz*2}px #A4B87A44;border:1.5px solid #C8D5A3;opacity:.92"></div>`,
          iconSize: [sz, sz],
          iconAnchor: [sz/2, sz/2],
        });
      }

      let markers = [];
      const countEl = document.getElementById('lm-count');

      function clearMarkers() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
      }

      function updateMap() {
        fetch('/api/online')
          .then(r => r.json())
          .then(data => {
            countEl.textContent = data.count;
            clearMarkers();
            (data.locations || []).forEach(loc => {
              if (loc.lat == null || loc.lon == null) return;
              const m = L.marker([loc.lat, loc.lon], {icon: makeIcon(loc.n)})
                .bindPopup(`<div class="lm-popup-city">${loc.flag} ${loc.city || 'Unknown City'}</div><div class="lm-popup-country">${loc.country || ''}</div><div class="lm-popup-n">${loc.n} operator${loc.n !== 1 ? 's' : ''} active</div>`)
                .addTo(map);
              markers.push(m);
            });
          })
          .catch(() => {});
      }

      updateMap();
      setInterval(updateMap, 30000);
      document.getElementById('lm-refresh').addEventListener('click', updateMap);

      // ping this session too
      let token = localStorage.getItem('dco_tok');
      if (!token) {
        token = ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
          (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
        localStorage.setItem('dco_tok', token);
      }
      fetch('/api/ping', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})}).catch(()=>{});
    })();
    </script>
  </body>
</html>
